version: '3.9'

services:
  db:
    image: postgres:17.4
    container_name: libraryapi-db-1
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: emc
      POSTGRES_PASSWORD: emc
    ports:
      - "5434:5432"
    volumes:
      - libraryapi_pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  libraryapi_pgdata: